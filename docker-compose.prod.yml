# =============================================================
# supply-chain-ams-stack · PRODUCCIÓN
# =============================================================
# Versión optimizada para VPS chico (2-4 vCPU, 4-8 GB RAM).
#
# Diferencias con docker-compose.yml (dev):
# - Sin Elastic/Kibana/Logstash/Prometheus/Grafana por default.
#   Activar con --profile observability si el VPS lo aguanta.
# - Sin Whisper por default (consume ~1 GB RAM idle). Activar con --profile voice.
# - Caddy como reverse proxy con HTTPS automático (Let's Encrypt).
# - Restart policies always; healthchecks estrictos.
# - Sin exponer puertos 6601/6700 al host; sólo 80/443 públicos vía Caddy.
# - Volúmenes persistentes con nombre fijo para backups.
#
# Uso:
#   cp .env.production.example .env
#   nano .env                    # completar valores reales
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml --profile observability up -d
# =============================================================

services:

  # -------------------------------------------------------------
  # Caddy — reverse proxy + HTTPS automático con Let's Encrypt
  # -------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: ams-prod-caddy
    restart: unless-stopped
    # v1.3.0: gateado tras profile. En este VPS el reverse-proxy es el CADDY
    # COMPARTIDO (red externa agendamiento_default, sirve miespejo.cl + roccoai.cl),
    # así que este caddy interno NO debe correr (chocaba en puerto 80 y hacía
    # abortar deploy.sh). Para un deploy STANDALONE (VPS dedicado sin caddy
    # compartido): docker compose -f docker-compose.prod.yml --profile standalone-proxy up -d
    profiles: ["standalone-proxy"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"      # HTTP/3
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      AMS_DOMAIN: ${AMS_DOMAIN:-ams.miespejo.cl}
      AMS_API_DOMAIN: ${AMS_API_DOMAIN:-api.ams.miespejo.cl}
      AMS_BASIC_AUTH: ${AMS_BASIC_AUTH:-}
    networks:
      - ams-prod-net
    depends_on:
      - platform
      - backend

  # -------------------------------------------------------------
  # Backend Fastify (no expone puertos al host en prod)
  # -------------------------------------------------------------
  backend:
    build:
      context: ../supply-chain-ams-agent/backend
      dockerfile: Dockerfile
    container_name: ams-prod-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BACKEND_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgres://ams_user:${POSTGRES_PASSWORD}@db:5432/ams_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      WHISPER_URL: ${WHISPER_URL:-http://whisper:9000}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://${AMS_DOMAIN}}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ../supply-chain-ams-agent/prompts:/app/prompts:ro
      - ams-prod-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # v1.2.8-prod: backend también necesita caddy-shared para que Caddy lo resuelva
    # por DNS. Sin esto api-ams.roccoai.cl da 502.
    networks:
      - ams-prod-net
      - caddy-shared

  # -------------------------------------------------------------
  # Platform Next.js (no expone puertos al host en prod)
  # -------------------------------------------------------------
  platform:
    build:
      context: ../supply-chain-ams-platform
      dockerfile: Dockerfile
      # v1.2.7-prod: NEXT_PUBLIC_* DEBE ir como build-arg para que quede
      # embebido en el bundle del cliente. Como runtime-env no sirve (el JS
      # del browser ya está compilado). Sin esto el browser pega a localhost:6601.
      args:
        NEXT_PUBLIC_AGENT_API_URL: ${NEXT_PUBLIC_AGENT_API_URL:-https://${AMS_API_DOMAIN}}
        NEXT_PUBLIC_APP_VERSION: ${APP_VERSION:-dev}
    container_name: ams-prod-platform
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_AGENT_API_URL: ${NEXT_PUBLIC_AGENT_API_URL:-https://${AMS_API_DOMAIN}}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    # v1.2.7-prod: dos redes — ams-prod-net (db, backend interno) +
    # agendamiento_default (Caddy compartido con Calmar). Sin la red de Caddy
    # el reverse-proxy no resuelve el hostname y devuelve 502.
    networks:
      - ams-prod-net
      - caddy-shared

  # -------------------------------------------------------------
  # PostgreSQL + pgvector
  # -------------------------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: ams-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ams_user}
      # FIX (audit v1.1.0 C3 relacionado): fail-fast si password no seteada.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ams_agent}
    volumes:
      - ams-prod-postgres:/var/lib/postgresql/data
      - ../supply-chain-ams-agent/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ams_user} -d ${POSTGRES_DB:-ams_agent}"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - ams-prod-net

  # -------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ams-prod-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - ams-prod-redis:/data
    networks:
      - ams-prod-net

  # -------------------------------------------------------------
  # Worker BullMQ (RAG + transcripciones + self-training cron)
  # -------------------------------------------------------------
  worker:
    build:
      context: ../supply-chain-ams-agent/worker
      dockerfile: Dockerfile
    container_name: ams-prod-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgres://ams_user:${POSTGRES_PASSWORD}@db:5432/ams_agent}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    networks:
      - ams-prod-net

  # -------------------------------------------------------------
  # Whisper (perfil "voice" — activar con --profile voice)
  # Consume ~1 GB RAM idle, ~2 GB durante transcripción.
  # -------------------------------------------------------------
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: ams-prod-whisper
    restart: unless-stopped
    profiles: ["voice"]
    environment:
      ASR_MODEL: ${ASR_MODEL:-base}
      ASR_ENGINE: openai_whisper
    networks:
      - ams-prod-net

  # -------------------------------------------------------------
  # Observability stack (perfil "observability")
  # -------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: ams-prod-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ../supply-chain-ams-agent/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ams-prod-prometheus:/prometheus
    networks:
      - ams-prod-net

  grafana:
    image: grafana/grafana:latest
    container_name: ams-prod-grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      # FIX C9 (audit v1.1.0): NO defaults para credenciales — fail-fast si no seteadas.
      # Antes: GRAFANA_ADMIN_PASSWORD:-cambiame → panel abierto con admin/cambiame.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:?GRAFANA_ADMIN_USER required in .env}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD required in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ams-prod-grafana:/var/lib/grafana
      - ../supply-chain-ams-agent/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - ams-prod-net

  # -------------------------------------------------------------
  # Alertmanager (v1.1.0 — Slack/Email/PagerDuty alert routing)
  # Consume el config en observability/alertmanager/alertmanager.yml
  # Vars requeridas en .env si querés notificaciones:
  #   SLACK_WEBHOOK_URL=https://hooks.slack.com/services/...
  #   ALERTMANAGER_SMTP_HOST=smtp.resend.com
  #   ALERTMANAGER_SMTP_FROM=alerts@tudominio.cl
  # -------------------------------------------------------------
  alertmanager:
    # FIX A21 (audit v1.1.0): Alertmanager NO expande env vars. Usamos
    # alpine + envsubst en entrypoint para procesar template antes de arrancar.
    image: alpine:3.20
    container_name: ams-prod-alertmanager
    restart: unless-stopped
    profiles: ["observability"]
    volumes:
      - ../supply-chain-ams-agent/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.tmpl:ro
      - ../supply-chain-ams-agent/observability/alertmanager/entrypoint.sh:/entrypoint.sh:ro
      - ams-prod-alertmanager:/alertmanager
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache gettext alertmanager curl >/dev/null 2>&1 || \
          (wget -qO- https://github.com/prometheus/alertmanager/releases/download/v0.27.0/alertmanager-0.27.0.linux-amd64.tar.gz | tar xz -C /tmp && \
           install /tmp/alertmanager-0.27.0.linux-amd64/alertmanager /bin/alertmanager && \
           apk add --no-cache gettext)
        exec /entrypoint.sh --storage.path=/alertmanager --web.external-url=https://${AMS_DOMAIN:-ams.tudominio.cl}/alerts
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_KEY: ${PAGERDUTY_KEY:-}
      ALERTMANAGER_SMTP_HOST: ${ALERTMANAGER_SMTP_HOST:-}
      ALERTMANAGER_SMTP_FROM: ${ALERTMANAGER_SMTP_FROM:-}
      ALERTMANAGER_SMTP_USERNAME: ${ALERTMANAGER_SMTP_USERNAME:-}
      ALERTMANAGER_SMTP_PASSWORD: ${ALERTMANAGER_SMTP_PASSWORD:-}
      ALERTMANAGER_TO: ${ALERTMANAGER_TO:-alerts@example.com}
    depends_on:
      - prometheus
    networks:
      - ams-prod-net

networks:
  ams-prod-net:
    name: ams-prod-net
    driver: bridge
  # v1.2.7-prod · red de Caddy compartido con Calmar (miespejo.cl + roccoai.cl)
  # Caddy corre en agendamiento_default y debe resolver ams-prod-platform por DNS.
  caddy-shared:
    name: agendamiento_default
    external: true

volumes:
  caddy_data:
    name: ams-prod-caddy-data
  caddy_config:
    name: ams-prod-caddy-config
  ams-prod-postgres:
    name: ams-prod-postgres
  ams-prod-redis:
    name: ams-prod-redis
  ams-prod-uploads:
    name: ams-prod-uploads
  ams-prod-prometheus:
    name: ams-prod-prometheus
  ams-prod-grafana:
    name: ams-prod-grafana
  ams-prod-alertmanager:
    name: ams-prod-alertmanager
